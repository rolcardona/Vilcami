name = "vilcami-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 * * * *"]

[vars]
SUPABASE_URL = "https://fqcugzmklzdjwwvwnslg.supabase.co"
WOMPI_BASE_URL = "https://sandbox.wompi.co/v1"

[[d1_databases]]
binding = "DB"
database_name = "vilcami-db"
database_id = "PLACEHOLDER_WILL_BE_CREATED"

[[kv_namespaces]]
binding = "TELEMETRY_RAW"
id = "PLACEHOLDER_WILL_BE_CREATED"

[[kv_namespaces]]
binding = "SECRETS_VAULT"
id = "PLACEHOLDER_WILL_BE_CREATED"

[[kv_namespaces]]
binding = "THROTTLE_KV"
id = "PLACEHOLDER_WILL_BE_CREATED"

# Workers AI binding (Phase 4)
[ai]
binding = "AI"